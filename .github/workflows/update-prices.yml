name: Update WFM Prices

on:
  schedule:
    - cron: '0 6 * * *'  # daily fallback at 06:00 UTC — restarts the chain if it ever breaks
  workflow_dispatch:       # manual trigger + self-trigger from the schedule-next-run step

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # commit prices.json
      actions: write   # trigger the next run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit updated prices.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --staged --quiet; then
            echo "prices.json unchanged — nothing to commit"
          else
            git commit -m "chore: update prices $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Schedule next run (30 min after completion)
        if: always()  # keep the chain alive even if fetch or commit had errors
        run: |
          echo "Waiting 30 minutes before triggering next run…"
          sleep 1800
          gh workflow run update-prices.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
